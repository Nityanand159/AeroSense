<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroSense | Real-Time Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; font-family: sans-serif; }
        #map { height: 80vh; width: 100%; }
        .header { padding: 20px; background: #003366; color: white; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>AeroSense Real-Time Air Quality Map</h1>
        <p>Live PM2.5 Levels Across the Globe</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Centers on India by default

        // 2. Add Base Map Tiles (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Add Real-Time Air Quality Layer
        // Using WAQI (World Air Quality Index) Project tiles
        // Note: 'use-your-token' is a placeholder. Get a free token at aqicn.org/api/
        const aqicnLayer = L.tileLayer('https://tiles.aqicn.org/tiles/usepa-aqi/{z}/{x}/{y}.png?token=demo', {
            attribution: 'Air Quality Tiles © <a href="https://waqi.info">waqi.info</a>'
        });

        aqicnLayer.addTo(map);
    </script>
</body>
</html>
