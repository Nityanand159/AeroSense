<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroSense - Research Card</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0eafc, #cfdef3);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #333;
            --accent-blue: #4a90e2;
            --tag-bg: #d1e3f8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            width: 320px;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .tag {
            display: inline-block;
            background: var(--tag-bg);
            color: var(--accent-blue);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 1.25rem;
            color: var(--text-main);
            margin: 0 0 12px 0;
            line-height: 1.3;
        }

        p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .download-link {
            display: flex;
            align-items: center;
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .download-link:hover {
            text-decoration: underline;
        }

        .icon {
            margin-left: 6px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <article class="card">
        <span class="tag">Technical Report</span>
        <h2>Sensor Calibration Framework</h2>
        <p>
            Details on our proprietary data cleaning process that filters noise 
            from low-cost IoT environmental sensors.
        </p>
        <a href="res.pdf" class="download-link">
            Download PDF <span class="icon">📄</span>
        </a>
    </article>

</body>
</html>
